<svg width="680" height="320" viewBox="0 0 680 320" role="img" xmlns="http://www.w3.org/2000/svg" aria-label="Harpera">
  <title>Harpera Logo</title>
  <desc>Logo Harpera phong cách tối giản cao cấp</desc>
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7B68EE"/>
      <stop offset="100%" stop-color="#20B2AA"/>
    </linearGradient>
    <linearGradient id="g2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#9D97F5"/>
      <stop offset="100%" stop-color="#3DD6C8"/>
