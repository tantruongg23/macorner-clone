    <line x1="-52" y1="10"  x2="-52" y2="180" stroke="url(#g1)" stroke-width="5.5" stroke-linecap="round"/>
    <line x1="-52" y1="180" x2=" 52" y2="180" stroke="url(#g1)" stroke-width="5.5" stroke-linecap="round"/>
    <line x1="-34" y1="0"   x2="-34" y2="180" stroke="url(#g2)" stroke-width="1.8" stroke-linecap="round" opacity="0.95"/>
    <line x1="-18" y1="-10" x2="-18" y2="180" stroke="url(#g2)" stroke-width="1.8" stroke-linecap="round" opacity="0.85"/>
    <line x1="  0" y1="-15" x2="  0" y2="180" stroke="url(#g2)" stroke-width="1.8" stroke-linecap="round" opacity="0.75"/>
    <line x1=" 16" y1="-10" x2=" 16" y2="180" stroke="url(#g2)" stroke-width="1.8" stroke-linecap="round" opacity="0.65"/>
    <line x1=" 32" y1="  4" x2=" 32" y2="180" stroke="url(#g2)" stroke-width="1.8" stroke-linecap="round" opacity="0.55"/>
    <line x1=" 46" y1=" 26" x2=" 46" y2="180" stroke="url(#g2)" stroke-width="1.8" stroke-linecap="round" opacity="0.42"/>
